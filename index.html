<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для Lizочки ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    /* ---------- БАЗОВЫЕ СТИЛИ ---------- */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: radial-gradient(circle at center, #1a1a2e, #0f0f1a);
        color: #eee;
        font-family: 'Cormorant Garamond', serif;
        text-align: center;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    /* контейнер для центрирования контента */
    .container {
        max-width: 800px;
        width: 100%;
        margin: 0 auto;
    }

    /* блоки с появлением */
    .screen {
        transition: opacity 0.5s ease;
    }

    .hidden {
        display: none !important;
    }

    /* кнопки */
    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 20px;
        background: #ff4d6d;
        color: white;
        cursor: pointer;
        transition: 0.3s;
        font-family: inherit;
        margin: 10px;
    }
    button:hover {
        background: #ff1f4b;
        transform: scale(1.02);
        box-shadow: 0 0 12px rgba(255,77,109,0.6);
    }

    /* видео */
    video {
        width: 100%;
        max-width: 650px;
        border-radius: 20px;
        box-shadow: 0 0 60px rgba(255,0,100,0.7);
        margin: 20px 0;
    }

    /* таймер */
    #loveCounter {
        animation: pulse 2s infinite;
        margin-bottom: 10px;
    }
    @keyframes pulse {
        0% { opacity: 0.7; }
        50% { opacity: 1; text-shadow: 0 0 10px rgba(255,100,150,0.6); }
        100% { opacity: 0.7; }
    }

    /* эффект печати */
    .typing {
        border-right: 2px solid white;
        white-space: nowrap;
        overflow: hidden;
        display: inline-block;
    }

    /* плавающие сердечки */
    .heart, .star, .name {
        position: fixed;
        pointer-events: none;
        z-index: 100;
        animation: float linear infinite;
    }
    @keyframes float {
        from { transform: translateY(100vh); opacity: 1; }
        to { transform: translateY(-10vh); opacity: 0; }
    }

    /* конфитти */
    .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        animation: confettiFall 2s ease-out forwards;
        z-index: 2000;
        pointer-events: none;
    }
    @keyframes confettiFall {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    /* ===== КНОПКИ ВНИЗУ ===== */
    .floating-btn {
        position: fixed;
        bottom: 25px;
        background: rgba(255,77,109,0.9);
        backdrop-filter: blur(5px);
        border-radius: 60px;
        padding: 12px 24px;
        font-size: 18px;
        font-weight: bold;
        box-shadow: 0 0 20px rgba(255,77,109,0.5);
        z-index: 200;
        cursor: pointer;
        transition: 0.3s;
        border: none;
        color: white;
        display: none; /* появятся после видео */
    }
    .floating-btn:hover {
        background: #ff1f4b;
        transform: scale(1.05);
        box-shadow: 0 0 25px #ff4d6d;
    }
    .calendar-btn {
        right: 25px;
    }
    .album-btn {
        left: 25px;
    }

    /* ===== МОДАЛЬНЫЕ ОКНА (общие) ===== */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(8px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }
    .modal-content {
        background: linear-gradient(145deg, #1a1a2e, #16213e);
        border-radius: 30px;
        width: 90%;
        max-width: 700px;
        max-height: 85vh;
        padding: 20px;
        box-shadow: 0 0 40px rgba(255,77,109,0.4);
        border: 1px solid rgba(255,77,109,0.5);
        color: white;
        display: flex;
        flex-direction: column;
        position: relative;
    }
    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 15px;
        border-bottom: 1px solid #ff4d6d;
        margin-bottom: 15px;
    }
    .modal-header h2 {
        margin: 0;
        font-size: 28px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .close-modal {
        background: none;
        border: none;
        font-size: 32px;
        cursor: pointer;
        color: #ff4d6d;
        transition: 0.2s;
    }
    .close-modal:hover {
        transform: rotate(90deg);
        color: white;
    }

    /* таблица событий (календарь) */
    .events-table {
        overflow-y: auto;
        max-height: 400px;
        border-radius: 20px;
    }
    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 8px;
    }
    tbody tr {
        background: rgba(255,255,255,0.03);
        backdrop-filter: blur(4px);
        border-radius: 12px;
        transition: 0.3s;
    }
    tbody tr:hover {
        background: rgba(255,77,109,0.15);
        box-shadow: 0 0 15px rgba(255,77,109,0.4);
    }
    td, th {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid rgba(255,77,109,0.3);
    }
    th {
        background: rgba(255,77,109,0.2);
        color: #ffb3c1;
    }
    .date-cell {
        cursor: pointer;
    }
    .birthday {
        background: linear-gradient(90deg, #ff4d6d, #ff9aa2);
        animation: pulseBirthday 2s infinite;
    }
    @keyframes pulseBirthday {
        0% { transform: scale(1); }
        50% { transform: scale(1.02); }
        100% { transform: scale(1); }
    }

    /* галерея внутри модалки фотоальбома */
    .album-gallery {
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
        max-height: 60vh;
        padding: 10px;
    }
    .album-item {
        background: rgba(255,255,255,0.05);
        border-radius: 20px;
        padding: 15px;
        transition: 0.3s;
    }
    .album-item img {
        width: 100%;
        max-height: 300px;
        object-fit: cover;
        border-radius: 16px;
        cursor: pointer;
        transition: 0.2s;
    }
    .album-item img:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(255,77,109,0.5);
    }
    .album-caption {
        margin-top: 8px;
        font-style: italic;
        color: #ffb3c1;
    }

    /* анимация появления строк */
    @keyframes fadeRow {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatUp {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-50px); opacity: 0; }
    }
</style>
</head>
<body>

<div class="container">
    <!-- СТАРТОВЫЙ ЭКРАН -->
    <div id="startScreen" class="screen">
        <h1 class="typing" id="title"></h1>
        <br><br>
        <button onclick="showMessage()">Открыть</button>
    </div>

    <!-- ЭКРАН С ТЕКСТОМ -->
    <div id="message" class="screen hidden">
        <h2 class="typing" id="text"></h2>
        <br><br>
        <button onclick="playVideo()">Смотреть</button>
    </div>

    <!-- ВИДЕО -->
    <div id="videoBlock" class="screen hidden">
        <video id="video" controls>
            <source src="cut.mp4" type="video/mp4">
            Твой браузер не поддерживает видео.
        </video>
    </div>
</div>

<!-- КНОПКИ ПЛАВАЮЩИЕ (появятся после видео) -->
<button id="calendarToggleBtn" class="floating-btn calendar-btn" style="display: none;">📅 Наш календарик ❤️</button>
<button id="albumToggleBtn" class="floating-btn album-btn" style="display: none;">📸 Наш фотоальбом 💖</button>

<!-- МОДАЛЬНОЕ ОКНО КАЛЕНДАРЯ -->
<div id="calendarModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📆 Наши важные даты</h2>
            <button class="close-modal" data-modal="calendarModal">&times;</button>
        </div>
        <div id="loveCounter" style="font-size:14px;color:#ffb3c1;margin-bottom:10px;"></div>
        <div class="events-table">
            <table>
                <thead>
                    <tr><th>Дата</th><th>Событие</th></tr>
                </thead>
                <tbody id="eventsTbody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО ФОТОАЛЬБОМА -->
<div id="albumModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📸 Наши тёплые моменты</h2>
            <button class="close-modal" data-modal="albumModal">&times;</button>
        </div>
        <div class="album-gallery" id="albumGallery">
            <!-- сюда будут подгружаться фото -->
        </div>
    </div>
</div>

<script>
    // ---------- ОСНОВНЫЕ ФУНКЦИИ ----------
    function typeText(element, text, speed = 50) {
        let i = 0;
        element.innerHTML = "";
        function typing() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(typing, speed);
            }
        }
        typing();
    }

    typeText(document.getElementById("title"), "Special for YoU, Lizочка ❤️", 70);

    function showMessage() {
        document.getElementById("startScreen").classList.add("hidden");
        let msgDiv = document.getElementById("message");
        msgDiv.classList.remove("hidden");
        typeText(document.getElementById("text"), "Мне хотелось сделать для тебя что-то особенное и приятное ❤️", 50);
    }

    function playVideo() {
        document.getElementById("message").classList.add("hidden");
        let videoDiv = document.getElementById("videoBlock");
        videoDiv.classList.remove("hidden");
        let video = document.getElementById("video");
        video.play().catch(e => console.log("Автоплей заблокирован, но видео можно запустить вручную", e));
        
        // Запускаем эффекты и показываем кнопки
        startEffects();
        document.getElementById("calendarToggleBtn").style.display = "flex";
        document.getElementById("albumToggleBtn").style.display = "flex";
    }

    // ---------- ПЛАВАЮЩИЕ СЕРДЕЧКИ, ЗВЁЗДЫ, ЛИЗОЧКИ ----------
    function startEffects() {
      setInterval(() => {
        // сердечко с разными цветами (включая жёлтый)
        const colors = ["red", "gold", "yellow", "white", "orange", "hotpink", "#ffcc00"];
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.color = colors[Math.floor(Math.random() * colors.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (10 + Math.random() * 30) + "px";
        heart.style.animationDuration = (3 + Math.random() * 5) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);

        // надпись "Лизочка"
        const name = document.createElement("div");
        name.className = "name";
        name.innerHTML = "Лизочка";
        name.style.left = Math.random() * 100 + "vw";
        name.style.fontSize = (12 + Math.random() * 20) + "px";
        name.style.color = "rgba(255,255,255,0.7)";
        name.style.animationDuration = (4 + Math.random() * 6) + "s";
        document.body.appendChild(name);
        setTimeout(() => name.remove(), 9000);

        // звёздочка
        const star = document.createElement("div");
        star.className = "star";
        star.innerHTML = "⭐";
        star.style.left = Math.random() * 100 + "vw";
        star.style.fontSize = (8 + Math.random() * 25) + "px";
        star.style.color = "#FFD966";
        star.style.animationDuration = (3 + Math.random() * 6) + "s";
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 8000);
    }, 180);
}

    // ---------- КОНФЕТТИ ----------
    function burstConfetti() {
        for (let i = 0; i < 70; i++) {
            const conf = document.createElement("div");
            conf.className = "confetti";
            conf.style.left = Math.random() * window.innerWidth + "px";
            conf.style.top = "0px";
            conf.style.background = `hsl(${Math.random() * 360}, 100%, 60%)`;
            conf.style.width = (5 + Math.random() * 12) + "px";
            conf.style.height = (5 + Math.random() * 12) + "px";
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 2000);
        }
    }

    // ---------- КАЛЕНДАРЬ (СОБЫТИЯ) ----------
    let events = [
        { date: "2026-03-11", desc: "💞 Наше знакомство 💛" },
        { date: "2026-03-12", desc: "🎬 Первый фильм вместе 🍿" },
        { date: "2026-03-13", desc: "⛸️ Поход на каток, держимся за ручки 🫶" },
        { date: "2026-03-17", desc: "🍢 Свидание в Шашлыкофф 😋" },
        { date: "2026-03-22", desc: "🚗 Поездка к Лине 🌆" },
        { date: "2026-03-22", desc: "💋 Первый поцелуй ✨" },
        { date: "2026-03-24", desc: "🌙 Наша первая ночь вместе 💤" },
        { date: "2026-03-26", desc: "🤒 Самая милая помощь больному 🌸" },
        { date: "2026-03-30", desc: "💓 <~6Q@=G5[6QEAE?;7QEBF65?;~> 💓" },
        { date: "2026-04-11", desc: "🌷 1 месяц вместе 💛" },
        { date: "2026-05-11", desc: "🌸 2 месяца вместе 💖" },
        { date: "2026-06-04", desc: "🎂 День рождения моей любимой 🎁💛", special: "birthday" },
        { date: "2026-06-11", desc: "☀️ 3 месяца вместе 💕" },
        { date: "2026-07-11", desc: "🌈 4 месяца вместе ✨" },
        { date: "2026-08-11", desc: "🔥 5 месяцев вместе 💓" },
        { date: "2026-09-11", desc: "💫 Полгода вместе 🫶" },
        { date: "2027-03-11", desc: "💍 1 год вместе 💛", special: "anniversary" },
        { date: "2028-03-11", desc: "🥂 2 года вместе 💖", special: "anniversary" },
        { date: "2029-03-11", desc: "🎉 3 года вместе 💞", special: "anniversary" },
        { date: "2030-03-11", desc: "🌹 4 года вместе ❤️", special: "anniversary" },
        { date: "2031-03-11", desc: "👑 5 лет вместе 💛", special: "anniversary" }
    ];

    function updateLoveCounter() {
        const startDate = new Date("2026-03-11T23:34:00");
        const now = new Date();
        let diff = Math.floor((now - startDate) / 1000);
        const days = Math.floor(diff / (3600*24));
        diff %= (3600*24);
        const hours = Math.floor(diff / 3600);
        diff %= 3600;
        const minutes = Math.floor(diff / 60);
        const seconds = diff % 60;
        const el = document.getElementById("loveCounter");
        if (el) {
            el.innerText = `💛 Мы знакомы: ${days} дн. ${hours} ч. ${minutes} мин. ${seconds} сек. 💛`;
        }
    }

    function renderEvents() {
        const tbody = document.getElementById("eventsTbody");
        const now = new Date();
        let html = "";
        events.forEach((ev, idx) => {
            const dateObj = new Date(ev.date);
            if (dateObj > now) return; // показываем только прошедшие и сегодняшние
            const formattedDate = dateObj.toLocaleDateString("ru-RU", { day: 'numeric', month: 'long', year: 'numeric' });
            const isBirthday = (dateObj.getDate() === 4 && dateObj.getMonth() === 5);
            html += `<tr class="${isBirthday ? 'birthday' : ''}" style="animation: fadeRow 0.5s ease ${idx*0.05}s both;">
                        <td class="date-cell">${formattedDate}</td>
                        <td>${ev.desc}</td>
                     </tr>`;
            // если сегодня – конфетти
            if (dateObj.toDateString() === now.toDateString()) {
                setTimeout(() => burstConfetti(), 500);
            }
        });
        tbody.innerHTML = html;
        // клик по дате – сердечко
        document.querySelectorAll(".date-cell").forEach(cell => {
            cell.addEventListener("click", (e) => {
                const heart = document.createElement("div");
                heart.innerHTML = "💖";
                heart.style.position = "fixed";
                heart.style.left = e.clientX + "px";
                heart.style.top = e.clientY + "px";
                heart.style.fontSize = "24px";
                heart.style.pointerEvents = "none";
                heart.style.animation = "floatUp 1s ease-out forwards";
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            });
        });
    }

    function checkSpecialDay() {
        const today = new Date().toISOString().slice(5,10);
        events.forEach(ev => {
            if (ev.date.slice(5,10) === today) {
                burstConfetti();
                const msg = document.createElement("div");
                msg.innerText = "💖 Сегодня особенный день 💖";
                msg.style.position = "fixed";
                msg.style.top = "20px";
                msg.style.left = "50%";
                msg.style.transform = "translateX(-50%)";
                msg.style.background = "#ff4d6d";
                msg.style.padding = "10px 20px";
                msg.style.borderRadius = "20px";
                msg.style.zIndex = "3000";
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 4000);
            }
        });
    }

    // ---------- ФОТОАЛЬБОМ (массив фоток) ----------
    const albumImages = [
        { src: "img/1.jpg", caption: "Наш первый кадр 💕" },
        { src: "img/2.jpg", caption: "Ты улыбаешься – и мир светлее 🌞" },
        { src: "img/3.jpg", caption: "Незабываемый момент ✨" }
        // добавь сюда больше фото по желанию: { src: "img/4.jpg", caption: "..." }
    ];

    function renderAlbum() {
        const galleryDiv = document.getElementById("albumGallery");
        if (!galleryDiv) return;
        let html = "";
        albumImages.forEach((img, idx) => {
            html += `
                <div class="album-item">
                    <img src="${img.src}" alt="фото ${idx+1}" onclick="openFullImage('${img.src}')">
                    <div class="album-caption">${img.caption}</div>
                </div>
            `;
        });
        galleryDiv.innerHTML = html;
    }

    // просмотр фото в полном размере (просто alert или можно открыть новое окно, но для простоты сделаем большую картинку)
    function openFullImage(src) {
        const modalFull = document.createElement("div");
        modalFull.style.position = "fixed";
        modalFull.style.top = "0";
        modalFull.style.left = "0";
        modalFull.style.width = "100%";
        modalFull.style.height = "100%";
        modalFull.style.backgroundColor = "rgba(0,0,0,0.95)";
        modalFull.style.zIndex = "2000";
        modalFull.style.display = "flex";
        modalFull.style.alignItems = "center";
        modalFull.style.justifyContent = "center";
        modalFull.style.cursor = "pointer";
        const imgBig = document.createElement("img");
        imgBig.src = src;
        imgBig.style.maxWidth = "90%";
        imgBig.style.maxHeight = "90%";
        imgBig.style.borderRadius = "20px";
        imgBig.style.boxShadow = "0 0 40px rgba(255,77,109,0.7)";
        modalFull.appendChild(imgBig);
        modalFull.onclick = () => modalFull.remove();
        document.body.appendChild(modalFull);
    }

    // ---------- МОДАЛЬНЫЕ ОКНА (универсальное открытие/закрытие) ----------
    function openModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.style.display = "flex";
    }
    function closeModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.style.display = "none";
    }

    // вешаем обработчики на кнопки
    document.getElementById("calendarToggleBtn").addEventListener("click", () => openModal("calendarModal"));
    document.getElementById("albumToggleBtn").addEventListener("click", () => openModal("albumModal"));

    // закрытие через крестик (у всех кнопок с data-modal)
    document.querySelectorAll(".close-modal").forEach(btn => {
        btn.addEventListener("click", () => {
            const modalId = btn.getAttribute("data-modal");
            closeModal(modalId);
        });
    });
    // закрытие по клику на фон
    window.addEventListener("click", (e) => {
        if (e.target.classList.contains("modal")) {
            e.target.style.display = "none";
        }
    });

    // инициализация календаря и альбома
    renderEvents();
    renderAlbum();
    updateLoveCounter();
    checkSpecialDay();
    setInterval(updateLoveCounter, 1000);

    // эффект свечения при воспроизведении видео
    const videoElem = document.getElementById("video");
    if (videoElem) {
        videoElem.addEventListener("play", () => {
            videoElem.style.boxShadow = "0 0 80px rgba(255,100,150,0.9)";
            setTimeout(() => videoElem.style.boxShadow = "0 0 60px rgba(255,0,100,0.7)", 800);
        });
    }

    // маленькое пасхальное яйцо (нажатие 'l')
    document.addEventListener("keydown", (e) => {
        if (e.key === "l") alert("❤️ Лизочка ❤️");
    });
</script>
</body>
</html>
