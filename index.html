<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title> Для Lizочки ❤️</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    text-align: center;
}

#loveCounter {
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { opacity: 0.7; }
    50% { opacity: 1; text-shadow: 0 0 10px rgba(255,100,150,0.6); }
    100% { opacity: 0.7; }
}
/* центр */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* кнопки */
button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 20px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    font-family: inherit;
}

button:hover {
    background: #ff1f4b;
    transform: scale(1.02);
    box-shadow: 0 0 12px rgba(255,77,109,0.6);
}

/* затемнение */
#fade {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    top: 0;
    left: 0;
    opacity: 0;
    pointer-events: none;
    transition: 1s;
    z-index: 5;
}

/* видео */
#videoBlock {
    display: none;
    z-index: 10;
}

video {
    width: 80%;
    max-width: 650px;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(255,0,100,0.7);
}
/* 🎂 день рождения */
.birthday {
    background: linear-gradient(90deg, #ff4d6d, #ff9aa2);
    box-shadow: 0 0 20px rgba(255,100,150,0.7);
    font-weight: bold;
    animation: pulseBirthday 2s infinite;
}

@keyframes pulseBirthday {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
}

.anniversary {
    background: rgba(255, 77, 109, 0.25);
    box-shadow: 0 0 20px rgba(255,77,109,0.8);
}
/* анимация текста */
.typing {
    border-right: 2px solid white;
    white-space: nowrap;
    overflow: hidden;
    display: inline-block;
}

@keyframes fadeRow {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* glow эффект строки */
tr {
    transition: 0.3s;
}

tr:hover {
    background: rgba(255,77,109,0.15);
    box-shadow: 0 0 15px rgba(255,77,109,0.4);
}
/* сердечки и звёздочки */
.heart, .star {
    position: absolute;
    animation: float linear infinite;
    pointer-events: none;
    z-index: 100;
}

@keyframes float {
    from {
        transform: translateY(100vh);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}

/* Лизочка */
.name {
    position: absolute;
    font-weight: bold;
    opacity: 0.7;
    animation: float linear infinite;
    pointer-events: none;
    z-index: 100;
}
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 8px;
}

tbody tr {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(4px);
    border-radius: 12px;
    overflow: hidden;
}

td:first-child {
    border-top-left-radius: 12px;
    border-bottom-left-radius: 12px;
}

td:last-child {
    border-top-right-radius: 12px;
    border-bottom-right-radius: 12px;
}
@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-50px); opacity: 0; }
}
/* ===== КАЛЕНДАРЬ (модальное окно) ===== */
.calendar-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: rgba(255,77,109,0.9);
    backdrop-filter: blur(5px);
    border-radius: 60px;
    padding: 12px 24px;
    font-size: 18px;
    font-weight: bold;
    box-shadow: 0 0 20px rgba(255,77,109,0.5);
    z-index: 200;
    display: none; /* появится после видео */
    cursor: pointer;
    transition: 0.3s;
    border: none;
    color: white;
}
.calendar-btn:hover {
    background: #ff1f4b;
    transform: scale(1.05);
    box-shadow: 0 0 25px #ff4d6d;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    animation: fadeInModal 0.3s ease;
}
@keyframes fadeInModal {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}
.modal-content {
    background: linear-gradient(145deg, #1a1a2e, #16213e);
    border-radius: 30px;
    width: 90%;
    max-width: 700px;
    max-height: 85vh;
    padding: 20px;
    box-shadow: 0 0 40px rgba(255,77,109,0.4);
    border: 1px solid rgba(255,77,109,0.5);
    color: white;
    display: flex;
    flex-direction: column;
    position: relative;
    font-family: 'Segoe UI', sans-serif;
}
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 15px;
    border-bottom: 1px solid #ff4d6d;
    margin-bottom: 15px;
}
.modal-header h2 {
    margin: 0;
    font-size: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.close-modal {
    background: none;
    border: none;
    font-size: 32px;
    cursor: pointer;
    color: #ff4d6d;
    padding: 0 10px;
    transition: 0.2s;
}
.close-modal:hover {
    transform: rotate(90deg);
    color: white;
}
.add-event-form {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: flex-end;
}
.add-event-form input, .add-event-form textarea {
    background: #0f0f1a;
    border: 1px solid #ff4d6d;
    border-radius: 16px;
    padding: 10px 12px;
    color: white;
    font-size: 14px;
    outline: none;
    flex: 1;
    font-family: inherit;
}
.add-event-form textarea {
    resize: vertical;
    min-width: 150px;
}
.add-event-form button {
    padding: 10px 20px;
    font-size: 16px;
    background: #ff4d6d;
    border-radius: 30px;
    white-space: nowrap;
}
.events-table {
    overflow-y: auto;
    max-height: 400px;
    border-radius: 20px;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid rgba(255,77,109,0.3);
}
th {
    background: rgba(255,77,109,0.2);
    color: #ffb3c1;
    font-weight: 600;
}
tr:hover {
    background: rgba(255,77,109,0.1);
}
.empty-message {
    text-align: center;
    padding: 30px;
    color: #ccc;
    font-style: italic;
}
/* конфитти эффект */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: #ff4d6d;
    position: absolute;
    animation: confettiFall 2s ease-out forwards;
    z-index: 2000;
    pointer-events: none;
}
@keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>

<div id="fade"></div>

<!-- первая страничка -->
<div id="startScreen" class="center">
    <h1 class="typing" id="title"></h1>
    <br><br>
    <button onclick="showMessage()">Открыть</button>
</div>

<!-- вторая страничкааа -->
<div id="message" class="center" style="display:none;">
    <h2 class="typing" id="text"></h2>
    <br><br>
    <button onclick="playVideo()">Смотреть</button>
</div>

<!-- виновник торжества  -->
<div id="videoBlock" class="center">
    <video id="video" controls>
        <source src="cut.mp4" type="video/mp4">
    </video>
</div>

<!-- Кнопка календаря (появится после видео) -->
<button id="calendarToggleBtn" class="calendar-btn">📅 Наш календарик ❤️</button>

<!-- Модальное окно календаря -->
<div id="calendarModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📆 Наши важные даты</h2>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>

        <div id="loveCounter" style="font-size:14px;color:#ffb3c1;margin-bottom:10px;"></div>

        <div class="events-table">
            <table>
                <thead>
                    <tr><th>Дата</th><th>Событие</th></tr>
                </thead>
                <tbody id="eventsTbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// ======================== ОРИГИНАЛЬНЫЙ КОД (не изменён) ========================
function typeText(element, text, speed = 50) {
    let i = 0;
    element.innerHTML = "";
    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

typeText(document.getElementById("title"), "Special for YoU, Lizочка ❤️", 70);

function checkSpecialDay() {
    const today = new Date().toISOString().slice(5, 10);

    events.forEach(ev => {
        const evDate = ev.date.slice(5, 10);

        if (evDate === today) {
            burstConfetti();

            const msg = document.createElement("div");
            msg.innerText = "💖 Сегодня особенный день 💖";
            msg.style.position = "fixed";
            msg.style.top = "20px";
            msg.style.left = "50%";
            msg.style.transform = "translateX(-50%)";
            msg.style.background = "#ff4d6d";
            msg.style.padding = "10px 20px";
            msg.style.borderRadius = "20px";
            msg.style.zIndex = "3000";

            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 4000);
        }
    });
}
function showMessage() {
    document.getElementById("startScreen").style.display = "none";
    let msg = document.getElementById("message");
    msg.style.display = "block";

    typeText(document.getElementById("text"),
    "Мне хотелось сделать для тебя что-то особенное и приятное ❤️", 50);
}

function updateLoveCounter() {
    const startDate = new Date("2026-03-11T23:34:00");
    const now = new Date();

    let diff = Math.floor((now - startDate) / 1000);

    const days = Math.floor(diff / (3600 * 24));
    diff %= (3600 * 24);

    const hours = Math.floor(diff / 3600);
    diff %= 3600;

    const minutes = Math.floor(diff / 60);
    const seconds = diff % 60;

    const el = document.getElementById("loveCounter");
    if (el) {
        el.innerText =
            `💛 Мы знакомы: ${days} дн. ${hours} ч. ${minutes} мин. ${seconds} сек. 💛`;
    }
}
// 🆕 Таймер отношений (пока отключён)
function updateRelationCounter() {
    // ❗ ВСТАВИШЬ ДАТУ КОГДА НАЧНЁТЕ ВСТРЕЧАТЬСЯ
    const relationStart = null; // например: "2026-04-01T20:00:00"

    if (!relationStart) return; // пока нет даты — ничего не показываем

    const startDate = new Date(relationStart);
    const now = new Date();

    let diff = Math.floor((now - startDate) / 1000);

    const days = Math.floor(diff / (3600 * 24));
    diff %= (3600 * 24);

    const hours = Math.floor(diff / 3600);
    diff %= 3600;

    const minutes = Math.floor(diff / 60);
    const seconds = diff % 60;

    const el = document.getElementById("loveCounter");
    if (el) {
        el.innerText +=
            `\n💞 Мы вместе: ${days} дн. ${hours} ч. ${minutes} мин. ${seconds} сек. 💞`;
    }
}
function playVideo() {
    let fade = document.getElementById("fade");
    fade.style.opacity = 1;

    setTimeout(() => {
        document.getElementById("message").style.display = "none";
        document.getElementById("videoBlock").style.display = "block";

        let video = document.getElementById("video");
        video.play();

        fade.style.opacity = 0;

        startEffects();
        // Показываем кнопку календаря после запуска видео
        document.getElementById("calendarToggleBtn").style.display = "flex";
    }, 1000);
}

function startEffects() {
    setInterval(() => {
        // сердечки
        const colors = ["red", "yellow", "yellow", "white", "yellow", "yellow"];
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤";
        heart.style.color = colors[Math.floor(Math.random() * colors.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (10 + Math.random() * 30) + "px";
        heart.style.animationDuration = (3 + Math.random() * 5) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);

        // Лизочка
        const name = document.createElement("div");
        name.className = "name";
        name.innerHTML = "Лизочка";
        name.style.left = Math.random() * 100 + "vw";
        name.style.fontSize = (12 + Math.random() * 20) + "px";
        name.style.color = "rgba(255,255,255,0.6)";
        name.style.animationDuration = (4 + Math.random() * 6) + "s";
        document.body.appendChild(name);
        setTimeout(() => name.remove(), 9000);

        // ДОПОЛНИТЕЛЬНЫЙ WOW-ЭФФЕКТ: звёздочки (летают вместе с сердечками)
        const star = document.createElement("div");
        star.className = "star";
        star.innerHTML = "⭐";
        star.style.left = Math.random() * 100 + "vw";
        star.style.fontSize = (8 + Math.random() * 25) + "px";
        star.style.color = "#FFD966";
        star.style.animationDuration = (3 + Math.random() * 6) + "s";
        star.style.opacity = 0.8;
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 8000);
    }, 180);
}

// ======================== КАЛЕНДАРИК ========================
let events = [
    { date: "2026-03-11", desc: "💞 Наше знакомство 💛" },

    { date: "2026-03-12", desc: "🎬 Первый фильм вместе 🍿" },

    { date: "2026-03-13", desc: "⛸️ Поход на каток, держимся за ручки 🫶" },

    { date: "2026-03-17", desc: "🍢 Свидание в Шашлыкофф 😋" },

    { date: "2026-03-22", desc: "🚗 Поездка к Лине 🌆" },

    { date: "2026-03-22", desc: "💋 Первый поцелуй ✨" },

    { date: "2026-03-24", desc: "🌙 Наша первая ночь вместе 💤" },

    { date: "2026-03-26", desc: "🤒 Самая милая помощь больному 🌸" },

    { date: "2026-03-30", desc: "💓 <~6Q@=G5[6QEAE?;7QEBF65?;~> 💓" },

    // 💖 месяцы 
    { date: "2026-04-11", desc: "🌷 1 месяц вместе 💛" },
    { date: "2026-05-11", desc: "🌸 2 месяца вместе 💖" },

    // 🎂 особенный день
    { date: "2026-06-04", desc: "🎂 День рождения моей любимой 🎁💛", special: "birthday" },

    { date: "2026-06-11", desc: "☀️ 3 месяца вместе 💕" },
    { date: "2026-07-11", desc: "🌈 4 месяца вместе ✨" },
    { date: "2026-08-11", desc: "🔥 5 месяцев вместе 💓" },

    { date: "2026-09-11", desc: "💫 Полгода вместе 🫶" },

    // 💍 годовщины
    { date: "2027-03-11", desc: "💍 1 год вместе 💛", special: "anniversary" },
    { date: "2028-03-11", desc: "🥂 2 года вместе 💖", special: "anniversary" },
    { date: "2029-03-11", desc: "🎉 3 года вместе 💞", special: "anniversary" },
    { date: "2030-03-11", desc: "🌹 4 года вместе ❤️", special: "anniversary" },
    { date: "2031-03-11", desc: "👑 5 лет вместе 💛", special: "anniversary" }
];

function loadEvents() {
    renderEvents();
    updateLoveCounter();
    checkSpecialDay();
    updateRelationCounter(); // 🆕

    setInterval(() => {
        updateLoveCounter();
        updateRelationCounter(); // 🆕
    }, 1000);
}

// Функция конфетти (WoW эффект)
function burstConfetti() {
    for (let i = 0; i < 70; i++) {
        const conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * window.innerWidth + "px";
        conf.style.top = "0px";
        conf.style.background = `hsl(${Math.random() * 360}, 100%, 60%)`;
        conf.style.width = (5 + Math.random() * 12) + "px";
        conf.style.height = (5 + Math.random() * 12) + "px";
        conf.style.position = "fixed";
        document.body.appendChild(conf);
        setTimeout(() => conf.remove(), 2000);
    }
}
function renderEvents() {
    const tbody = document.getElementById("eventsTbody");
    const now = new Date();

    let html = "";

    events.forEach((ev, idx) => {
        const dateObj = new Date(ev.date);

        // 👉 скрываем будущие события
        if (dateObj > now) return;

        const formattedDate = dateObj.toLocaleDateString("ru-RU", {
            day: 'numeric',
            month: 'long',
            year: 'numeric'
        });

        // 🎂 проверка на день рождения (4 июня)
        const isBirthday = dateObj.getDate() === 4 && dateObj.getMonth() === 5;

        html += `
            <tr 
                class="${isBirthday ? 'birthday' : ''}" 
                style="animation: fadeRow 0.5s ease ${idx * 0.05}s both;">
                
                <td class="date-cell">${formattedDate}</td>
                <td>${ev.desc}</td>
            </tr>
        `;

        // 🎉 если дата наступила СЕГОДНЯ → эффект
        if (
            dateObj.getDate() === now.getDate() &&
            dateObj.getMonth() === now.getMonth() &&
            dateObj.getFullYear() === now.getFullYear()
        ) {
            setTimeout(() => burstConfetti(), 500);
        }
    });

    tbody.innerHTML = html;

    // 💖 сердечки при клике
    document.querySelectorAll(".date-cell").forEach(cell => {
        cell.addEventListener("click", (e) => {
            const heart = document.createElement("div");
            heart.innerHTML = "💖";
            heart.style.position = "fixed";
            heart.style.left = e.clientX + "px";
            heart.style.top = e.clientY + "px";
            heart.style.fontSize = "20px";
            heart.style.pointerEvents = "none";
            heart.style.animation = "floatUp 1s ease-out forwards";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        });
    });
}

// Модальное окно
const modal = document.getElementById("calendarModal");
const openBtn = document.getElementById("calendarToggleBtn");
const closeBtn = document.getElementById("closeModalBtn");

// Инициализация календаря
loadEvents();

// Маленький WoW эффект: если видео загрузилось и играет, появляется сияние вокруг видео
const videoElem = document.getElementById("video");
if (videoElem) {
    videoElem.addEventListener("play", () => {
        videoElem.style.boxShadow = "0 0 80px rgba(255,100,150,0.9)";
        setTimeout(() => {
            if (videoElem) videoElem.style.boxShadow = "0 0 60px rgba(255,0,100,0.7)";
        }, 800);
    });
}
openBtn.addEventListener("click", () => {
    modal.style.display = "flex";
});

closeBtn.addEventListener("click", () => {
    modal.style.display = "none";
});

window.addEventListener("click", (e) => {
    if (e.target === modal) {
        modal.style.display = "none";
    }
});
</script>

</body>
</html>
